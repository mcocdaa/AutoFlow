version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: autoflow-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: autoflow_db
      MYSQL_USER: autoflow
      MYSQL_PASSWORD: autoflow_secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7.0-alpine
    container_name: autoflow-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  influxdb:
    image: influxdb:2.7
    container_name: autoflow-influxdb
    restart: always
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: password123
      DOCKER_INFLUXDB_INIT_ORG: autoflow
      DOCKER_INFLUXDB_INIT_BUCKET: autoflow_logs
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2

  minio:
    image: minio/minio
    container_name: autoflow-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  mysql_data:
  redis_data:
  influxdb_data:
  minio_data:
