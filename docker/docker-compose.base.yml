# ============================================
# AutoFlow Docker Compose 基础模板
# ============================================

networks:
  autoflow-network:
    driver: bridge

services:
  autoflow-backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: autoflow-backend
    restart: unless-stopped
    environment:
      - PORT=3000
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - API_VERSION=v1
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=${DB_USER:-autoflow}
      - DB_NAME=${DB_NAME:-autoflow_db}
      - DB_PASSWORD_FILE=/run/secrets/db_password
      - SECRET_KEY_FILE=/run/secrets/secret_key
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=${REDIS_DB:-0}
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app/backend
      - SECRET_FALLBACK_MODE=${SECRET_FALLBACK_MODE:-default}
    secrets:
      - db_password
      - secret_key
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ../plugins:/app/plugins:ro
    networks:
      - autoflow-network
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mysql:
    image: mysql:8.0
    container_name: autoflow-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/mysql_root_password
      MYSQL_DATABASE: ${DB_NAME:-autoflow_db}
      MYSQL_USER: ${DB_USER:-autoflow}
      MYSQL_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - mysql_root_password
      - db_password
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - autoflow-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7.0-alpine
    container_name: autoflow-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - autoflow-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  mysql_data:
  redis_data:

secrets:
  mysql_root_password:
    file: ../secrets/mysql_root_password
  db_password:
    file: ../secrets/db_password
  secret_key:
    file: ../secrets/secret_key
