# backend/docker-compose.dev.yml
version: '3.8'

services:
  # 服务名必须和 backend/docker-compose.yml 里的 "backend" 一致
  backend:
    volumes:
      # 开发专属挂载（基础配置里的 ../backend:/app/backend 已存在，无需重复）
      - ../backend/.vscode:/app/backend/.vscode  # 调试配置同步
      - backend_dev_cache:/app/backend/.cache    # 开发缓存持久化
    ports:
      - "5678:5678"  # Python调试端口（开发专属）
    restart: "no"     # 开发环境禁用自动重启

# 后端开发专属卷（仅开发环境用）
volumes:
  backend_dev_cache:
