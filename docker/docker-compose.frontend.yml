# ============================================
# AutoFlow 前端叠加层
# 与 docker-compose.base.yml 合并使用
# 注意：base.yml 已包含 backend，此文件仅暴露前端并添加 frontend 服务
# ============================================

services:
  autoflow-frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: web
    container_name: autoflow-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_EXTERNAL_PORT:-8001}:8000"
    environment:
      - VITE_API_URL=http://autoflow-backend:3000
      - DOCKER_WEB=true
    networks:
      - autoflow-network
    depends_on:
      - autoflow-backend

networks:
  autoflow-network:
    name: autoflow-network
