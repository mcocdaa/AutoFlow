# @file /plugins/zhihu_digest/config.yaml
# @brief 知乎回答总结插件配置
# @create 2026-03-15 00:00:00

# 默认配置（可被环境变量覆盖）
defaults:
  timeout_seconds: 30
  mode: auto
  dry_run: false

# 敏感配置（通过环境变量或 secrets 文件注入）
secrets:
  # 从环境变量读取：ZHIHU_COOKIE
  # 或从文件读取：ZHIHU_COOKIE_FILE
  cookie_env: ZHIHU_COOKIE
  cookie_file: ZHIHU_COOKIE_FILE
