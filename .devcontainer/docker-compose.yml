# ============================================
# DevContainer 专用配置
# 完全独立于生产环境
# ============================================

version: "3.8"

services:
  dev-container:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    container_name: autoflow-dev

    # 使用 host 网络便于开发
    network_mode: host

    volumes:
      - ..:/workspace:cached
      - /var/run/docker.sock:/var/run/docker.sock:rw
      - dev-node_modules:/workspace/frontend/node_modules
      - dev-poetry-cache:/root/.cache/pypoetry

    environment:
      - ENV_TYPE=dev

    # 开发工具预装
    command: sleep infinity

volumes:
  dev-node_modules:
  dev-poetry-cache:
