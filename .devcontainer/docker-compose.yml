# .devcontainer/docker-compose.yml
services:
  dev-container:
    build:
      context: ./.devcontainer
      dockerfile: Dockerfile  # 构建上面的开发镜像
    volumes:
      - ./:/workspace:cached  # 挂载整个项目到容器（写代码同步）
      - /var/run/docker.sock:/var/run/docker.sock  # 容器内操作宿主机Docker
    command: sleep infinity  # 保持容器运行（供VS Code连接）
    network_mode: host  # 共享宿主机网络，方便访问业务容器
