version: '3.8'

networks:
  default:
    name: ${NETWORK_NAME:-autoflow_default}

services:
  # Backend Service
  backend:
    build:
      context: ../
      dockerfile: backend/Dockerfile
    container_name: ${CONTAINER_PREFIX:-autoflow}-backend
    restart: always
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=${DB_USER:-autoflow}
      - DB_NAME=${DB_NAME:-autoflow_db}
      - DB_PASSWORD_FILE=/run/secrets/db_password
      - SECRET_KEY_FILE=/run/secrets/secret_key
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis:6379/${REDIS_DB:-0}
      - PYTHONPATH=${PYTHONPATH:-}:/app/backend
    secrets:
      - db_password
      - secret_key
    depends_on:
      - mysql
      - redis
    volumes:
      - ../backend:/app/backend:cached # Mount code for development/hot-reload support even in this mode

  # Database Services
  mysql:
    image: mysql:8.0
    container_name: ${CONTAINER_PREFIX:-autoflow}-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/mysql_root_password
      MYSQL_DATABASE: ${DB_NAME:-autoflow_db}
      MYSQL_USER: ${DB_USER:-autoflow}
      MYSQL_PASSWORD_FILE: /run/secrets/db_password
    ports:
      - "${DB_PORT:-3306}:3306"
    secrets:
      - mysql_root_password
      - db_password
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7.0-alpine
    container_name: ${CONTAINER_PREFIX:-autoflow}-redis
    restart: always
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data:

secrets:
  mysql_root_password:
    file: ../secrets/mysql_root_password
  db_password:
    file: ../secrets/db_password
  secret_key:
    file: ../secrets/secret_key
