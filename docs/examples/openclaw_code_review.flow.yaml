# @file /docs/examples/openclaw_code_review.flow.yaml
# @brief OpenClaw 代码审查流水线
# @description
#   本流程用于自动化代码审查流程：
#   1. 从 GitHub/GitLab 拉取 PR/MR 的代码 diff
#   2. 运行代码检查（lint、静态分析等）
#   3. 收集检查结果
#   4. 生成结构化的审查报告
#
#   触发方式：建议配置为 PR webhook 触发
#   参数：repo, pr_number, base_branch
# @create 2026-03-14

version: "1"
name: "openclaw-code-review"
description: "OpenClaw 代码审查流水线"

defaults:
  timeoutMs: 300000
  retry:
    maxAttempts: 1
    backoffMs: 0

steps:
  - id: "fetch-pr-diff"
    name: "拉取 PR Diff"
    description: "从 GitHub 获取 PR 的代码变更内容"
    action:
      type: "openclaw.http_request"
      params:
        method: "GET"
        url: "https://api.github.com/repos/{{vars.repo}}/pulls/{{vars.pr_number}}/files"
        headers:
          Accept: "application/vnd.github.v3+json"
          Authorization: "Bearer {{secrets.github_token}}"
    check:
      type: "http.statusOk"
      params:
        expectedStatus: 200

  - id: "fetch-diff-content"
    name: "获取 Diff 内容"
    description: "获取 PR 的完整 diff 文本"
    action:
      type: "openclaw.http_request"
      params:
        method: "GET"
        url: "https://api.github.com/repos/{{vars.repo}}/pulls/{{vars.pr_number}}"
        headers:
          Accept: "application/vnd.github.v3.diff"
          Authorization: "Bearer {{secrets.github_token}}"
    check:
      type: "text.notEmpty"

  - id: "run-lint-check"
    name: "运行代码检查"
    description: "执行 lint 和静态代码分析"
    action:
      type: "openclaw.exec"
      params:
        command: "npm run lint && npm run type-check"
        cwd: "{{vars.repo_path}}"
        timeout_seconds: 120
    check:
      type: "exit_code.zero"

  - id: "collect-check-results"
    name: "收集检查结果"
    description: "汇总 lint 和测试的结果"
    action:
      type: "openclaw.spawn_agent"
      params:
        agent: "qa_ops"
        task: "分析以下代码检查结果，提取关键问题：\n\n代码变更：{{steps.fetch-diff-content.output}}\n\n检查结果：{{steps.run-lint-check.output}}"
        timeout_ms: 60000

  - id: "generate-review-report"
    name: "生成审查报告"
    description: "调用后端和前端 Agent 并行审查代码"
    action:
      type: "openclaw.spawn_agent"
      params:
        agent: "backend_dev"
        task: "作为后端专家审查以下代码变更，关注：\n1. API 设计规范性\n2. 数据库操作安全性\n3. 错误处理完整性\n4. 性能影响\n\n代码：{{steps.fetch-diff-content.output}}"
        timeout_ms: 90000

  - id: "frontend-review"
    name: "前端代码审查"
    description: "前端专家审查 UI/UX 相关代码"
    action:
      type: "openclaw.spawn_agent"
      params:
        agent: "frontend_dev"
        task: "作为前端专家审查以下代码变更，关注：\n1. 组件设计合理性\n2. 状态管理规范性\n3. 响应式适配\n4. 可访问性\n\n代码：{{steps.fetch-diff-content.output}}"
        timeout_ms: 90000

  - id: "merge-review-results"
    name: "合并审查结果"
    description: "汇总各 Agent 的审查意见，生成最终报告"
    action:
      type: "openclaw.spawn_agent"
      params:
        agent: "coord"
        task: "汇总以下代码审查意见，生成结构化的审查报告：\n\n后端审查：{{steps.generate-review-report.output}}\n\n前端审查：{{steps.frontend-review.output}}\n\n检查结果：{{steps.collect-check-results.output}}\n\n报告格式：\n1. 总体评价\n2. 关键问题（按严重程度）\n3. 建议改进项\n4. 通过/需修改结论"
        timeout_ms: 60000

  - id: "post-review-comment"
    name: "发布审查评论"
    description: "将审查报告发布到 PR 评论区"
    action:
      type: "openclaw.http_request"
      params:
        method: "POST"
        url: "https://api.github.com/repos/{{vars.repo}}/issues/{{vars.pr_number}}/comments"
        headers:
          Accept: "application/vnd.github.v3+json"
          Authorization: "Bearer {{secrets.github_token}}"
        body:
          body: "## 🤖 Auto Code Review Report\n\n{{steps.merge-review-results.output}}\n\n---\n*Generated by OpenClaw Code Review Flow*"
    check:
      type: "http.statusOk"
      params:
        expectedStatus: 201
